services:
  superfcai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: superfcai
    restart: unless-stopped
    expose:
      - "3001"
    env_file:
      - .env
    environment:
      - DB_FILE=/app/data/database.sqlite
    volumes:
      - superfcai_data:/app/data

  caddy:
    image: caddy:2-alpine
    container_name: superfcai-caddy
    restart: unless-stopped
    depends_on:
      - superfcai
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - TLS_EMAIL=${TLS_EMAIL:-admin@localhost.local}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  superfcai_data:
  caddy_data:
  caddy_config:
